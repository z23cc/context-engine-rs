<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nerve Console</title>
<style>
  :root {
    /* surfaces — layered near-black, low chroma */
    --bg: #0b0d10;
    --surface-1: #101317;
    --surface-2: #161a20;
    --surface-3: #1d222a;
    --overlay: rgba(6, 8, 11, 0.66);
    /* borders / hairlines */
    --border: #222831;
    --border-strong: #2c333d;
    --border-faint: #191d23;
    /* text */
    --text: #e8edf2;
    --text-2: #aab4c0;
    --muted: #7b8694;
    --dim: #5a6573;
    /* accent — teal/cyan (Nerve brand) */
    --accent: #3dd6c4;
    --accent-press: #2bb8a8;
    --accent-soft: rgba(61, 214, 196, 0.12);
    --accent-ring: rgba(61, 214, 196, 0.40);
    --on-accent: #04221f;
    /* user bubble — distinct from accent */
    --user-bg: #232b36;
    --user-text: #eef3f9;
    /* semantic */
    --ok: #54c98a;
    --warn: #e0b341;
    --err: #f0726a;
    --reason: #a98bf0;
    --ok-soft: rgba(84, 201, 138, 0.14);
    --err-soft: rgba(240, 114, 106, 0.14);
    --warn-soft: rgba(224, 179, 65, 0.12);
    --run-soft: rgba(61, 214, 196, 0.14);
    /* type */
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    /* radii */
    --r-sm: 7px;
    --r-md: 10px;
    --r-lg: 14px;
    --r-pill: 999px;
    --r-bubble: 16px;
    /* layout */
    --sidebar-w: 264px;
    --topbar-h: 54px;
    --content-max: 760px;
    /* elevation */
    --shadow-2: 0 8px 28px rgba(0, 0, 0, 0.5);
    --shadow-pop: 0 16px 48px rgba(0, 0, 0, 0.6);
    /* motion */
    --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
    --dur: 140ms;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent-soft); }
  /* scrollbars — thin, restrained */
  * { scrollbar-width: thin; scrollbar-color: var(--surface-3) transparent; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: var(--r-pill); border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); background-clip: padding-box; }

  /* focus visibility — accent ring on interactive elements */
  a:focus-visible, button:focus-visible, input:focus-visible,
  textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--accent-ring);
    outline-offset: 1px;
  }

  .hidden { display: none !important; }
  svg { display: block; }

  /* ===================================================================== */
  /* App shell                                                             */
  /* ===================================================================== */
  .app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: 100vh;
    width: 100%;
  }

  /* ---- Sidebar ---- */
  .sidebar {
    grid-column: 1;
    background: var(--surface-1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
    min-width: 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 12px;
  }
  .brand .mark { color: var(--accent); flex: 0 0 auto; }
  .brand .word { font-size: 15px; font-weight: 650; letter-spacing: 0.2px; }
  .brand .ws { font-size: 11.5px; color: var(--muted); margin-left: auto; max-width: 96px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sb-pad { padding: 0 12px; }
  .newchat {
    display: flex; align-items: center; gap: 9px;
    width: 100%; padding: 10px 12px;
    background: var(--surface-2); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--r-md);
    font-family: var(--sans); font-size: 13.5px; font-weight: 600;
    cursor: pointer; transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
  }
  .newchat:hover { background: var(--surface-3); border-color: var(--border-strong); }
  .newchat .kbd { margin-left: auto; font-size: 11px; color: var(--dim); font-family: var(--mono); font-weight: 400; }
  .newchat svg { flex: 0 0 auto; }

  .sb-section-label {
    padding: 16px 16px 6px; font-size: 10.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted);
  }
  .threads { overflow-y: auto; flex: 1 1 auto; min-height: 0; padding: 0 8px; }
  .thread-row {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 10px; border-radius: var(--r-sm); cursor: pointer;
    color: var(--text-2); position: relative; border: 1px solid transparent;
    transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  }
  .thread-row:hover { background: var(--surface-2); color: var(--text); }
  .thread-row.active { background: var(--surface-3); color: var(--text); }
  .thread-row.active::before {
    content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px;
    background: var(--accent); border-radius: var(--r-pill);
  }
  .thread-row .ti { flex: 0 0 auto; color: var(--muted); }
  .thread-row.active .ti { color: var(--accent); }
  .thread-row .tt { flex: 1 1 auto; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .thread-row .live-dot { flex: 0 0 auto; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .threads .empty { padding: 8px 12px; color: var(--dim); font-size: 12.5px; }

  .sb-footer { border-top: 1px solid var(--border-faint); padding: 8px; }
  .sb-item {
    display: flex; align-items: center; gap: 9px;
    width: 100%; padding: 9px 10px; border-radius: var(--r-sm);
    background: transparent; border: none; color: var(--text-2);
    font-family: var(--sans); font-size: 13px; cursor: pointer; text-align: left;
    transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  }
  .sb-item:hover { background: var(--surface-2); color: var(--text); }
  .sb-item svg { flex: 0 0 auto; color: var(--muted); }
  .sb-item:hover svg { color: var(--text-2); }
  .sb-item .ct { margin-left: auto; font-size: 11px; color: var(--dim); font-family: var(--mono); }
  .sb-conn { display: flex; align-items: center; gap: 8px; padding: 9px 11px; font-size: 12px; color: var(--muted); }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); flex: 0 0 auto; }
  .dot.ok { background: var(--ok); }
  .dot.warn { background: var(--warn); }
  .dot.err { background: var(--err); }

  /* ---- Main column ---- */
  .main { grid-column: 2; display: flex; flex-direction: column; min-width: 0; min-height: 0; }

  .topbar {
    flex: 0 0 auto; height: var(--topbar-h);
    display: flex; align-items: center; gap: 12px;
    padding: 0 18px; border-bottom: 1px solid var(--border); background: var(--surface-1);
  }
  .hamburger {
    display: none; background: transparent; border: 1px solid var(--border);
    border-radius: var(--r-sm); padding: 6px; color: var(--text-2); cursor: pointer;
  }
  .hamburger:hover { background: var(--surface-2); }
  .conv-title { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv-sub { font-size: 11.5px; color: var(--muted); font-family: var(--mono); margin-left: 2px; }
  .topbar .spacer { flex: 1 1 auto; }

  .picker {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 11px; border: 1px solid var(--border); border-radius: var(--r-pill);
    background: var(--surface-2); color: var(--text-2); cursor: pointer;
    font-family: var(--mono); font-size: 12px; max-width: 280px;
    transition: border-color var(--dur) var(--ease), color var(--dur) var(--ease);
  }
  .picker:hover { border-color: var(--border-strong); color: var(--text); }
  .picker .pk-txt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .picker svg { flex: 0 0 auto; color: var(--muted); }
  .topbar .server-meta { font-size: 11.5px; color: var(--muted); font-family: var(--mono); }
  .topbar .server-meta b { color: var(--text-2); font-weight: 600; }

  /* model picker popover */
  .popover {
    position: absolute; z-index: 60; top: calc(var(--topbar-h) - 4px); right: 18px;
    width: 280px; background: var(--surface-2); border: 1px solid var(--border-strong);
    border-radius: var(--r-md); box-shadow: var(--shadow-pop); padding: 14px;
  }
  .popover .pop-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 10px; }
  .popover .pop-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .popover label { font-size: 11px; color: var(--muted); }
  .popover .pop-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

  /* ---- Conversation ---- */
  .conversation { flex: 1 1 auto; overflow-y: auto; min-height: 0; }
  .conv-inner { max-width: var(--content-max); margin: 0 auto; padding: 26px 20px 8px; }

  /* empty / start-session state */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100%; padding: 32px 20px; text-align: center;
  }
  .start-card {
    width: 100%; max-width: 460px; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: var(--r-lg); padding: 24px;
    text-align: left; box-shadow: var(--shadow-2);
  }
  .start-card .es-head { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; text-align: center; }
  .start-card .es-mark { color: var(--accent); }
  .start-card .es-title { font-size: 17px; font-weight: 650; }
  .start-card .es-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }

  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .field.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
  input, textarea, select {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm);
    color: var(--text); font-family: var(--sans); font-size: 13.5px; padding: 9px 11px;
    transition: border-color var(--dur) var(--ease);
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--border-strong); }
  textarea { resize: vertical; line-height: 1.5; }
  .invalid { border-color: var(--err) !important; }

  details.advanced { margin: 4px 0 14px; }
  details.advanced > summary { cursor: pointer; color: var(--muted); font-size: 12.5px; user-select: none; list-style: none; display: flex; align-items: center; gap: 6px; }
  details.advanced > summary::-webkit-details-marker { display: none; }
  details.advanced > summary::before { content: "▸"; font-size: 10px; color: var(--dim); transition: transform var(--dur) var(--ease); }
  details.advanced[open] > summary::before { transform: rotate(90deg); }
  details.advanced[open] > summary { color: var(--text); }
  .adv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .adv-grid .field { margin-bottom: 0; }
  .adv-grid .field.span2 { grid-column: span 2; }

  button {
    font-family: var(--sans); font-size: 13.5px; font-weight: 600; cursor: pointer;
    border-radius: var(--r-sm); padding: 9px 18px; border: 1px solid transparent;
    transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease), opacity var(--dur) var(--ease);
  }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  button.primary { background: var(--accent); color: var(--on-accent); }
  button.primary:not(:disabled):hover { background: var(--accent-press); }
  button.ghost { background: transparent; color: var(--text); border-color: var(--border); }
  button.ghost:not(:disabled):hover { background: var(--surface-2); border-color: var(--border-strong); }
  button.small { padding: 6px 13px; font-size: 12.5px; }
  button.block { width: 100%; }
  .hint { color: var(--dim); font-size: 12px; font-family: var(--mono); }
  .es-hint { margin-top: 10px; min-height: 16px; }

  /* ---- turns ---- */
  .turn-user { display: flex; justify-content: flex-end; margin: 18px 0; }
  .turn-user .bubble {
    background: var(--user-bg); color: var(--user-text);
    border-radius: var(--r-bubble) var(--r-bubble) 4px var(--r-bubble);
    padding: 11px 15px; max-width: 80%; white-space: pre-wrap; word-break: break-word;
    line-height: 1.55; font-size: 14px;
  }
  .turn-assistant { margin: 18px 0 26px; }
  .turn-head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted);
  }
  .turn-head .avatar { color: var(--accent); display: inline-flex; }
  .turn-head .label { font-weight: 600; }
  .turn-status { text-transform: none; letter-spacing: 0; color: var(--dim); font-family: var(--mono); font-size: 11px; margin-left: 4px; display: inline-flex; align-items: center; gap: 5px; }
  .turn-status.thinking { color: var(--accent); }
  .turn-status.thinking .typing { display: inline-flex; gap: 3px; }
  .turn-status.thinking .typing i { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); display: inline-block; animation: typing 1.1s infinite ease-in-out; }
  .turn-status.thinking .typing i:nth-child(2) { animation-delay: 0.18s; }
  .turn-status.thinking .typing i:nth-child(3) { animation-delay: 0.36s; }
  @keyframes typing { 0%, 60%, 100% { opacity: 0.25; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-2px); } }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  .turn-body { display: flex; flex-direction: column; gap: 12px; }

  .blk { word-break: break-word; }
  .blk.msg { color: var(--text); font-size: 15px; line-height: 1.62; }
  .blk.msg.raw { white-space: pre-wrap; }

  /* markdown rendered prose */
  .md > *:first-child { margin-top: 0; }
  .md > *:last-child { margin-bottom: 0; }
  .md p { margin: 0 0 12px; }
  .md h1, .md h2, .md h3, .md h4 { margin: 18px 0 8px; line-height: 1.3; font-weight: 650; }
  .md h1 { font-size: 21px; } .md h2 { font-size: 18px; } .md h3 { font-size: 16px; } .md h4 { font-size: 14.5px; color: var(--text-2); }
  .md ul, .md ol { margin: 0 0 12px; padding-left: 24px; }
  .md li { margin: 4px 0; }
  .md a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
  .md a:hover { border-bottom-color: var(--accent); }
  .md strong { font-weight: 650; color: var(--text); }
  .md em { font-style: italic; }
  .md blockquote { margin: 0 0 12px; padding: 4px 0 4px 14px; border-left: 3px solid var(--border-strong); color: var(--text-2); }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
  .md code.inline {
    font-family: var(--mono); font-size: 0.88em; background: var(--surface-3);
    border: 1px solid var(--border-faint); padding: 1px 5px; border-radius: 5px; color: var(--text);
  }

  /* code blocks */
  .code-block { border: 1px solid var(--border); border-radius: var(--r-md); background: var(--surface-3); overflow: hidden; margin: 0 0 12px; }
  .code-block .cb-head { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.18); }
  .code-block .cb-lang { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: lowercase; }
  .code-block .cb-copy {
    display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px;
    background: transparent; border: 1px solid var(--border); border-radius: var(--r-sm);
    color: var(--muted); font-size: 11px; font-family: var(--sans); cursor: pointer;
  }
  .code-block .cb-copy:hover { color: var(--text); border-color: var(--border-strong); }
  .code-block .cb-copy.copied { color: var(--ok); border-color: var(--ok); }
  .code-block pre { margin: 0; padding: 12px 14px; overflow-x: auto; }
  .code-block code { font-family: var(--mono); font-size: 12.5px; line-height: 1.55; color: var(--text); white-space: pre; }

  /* reasoning disclosure */
  .reason-block { border-left: 2px solid var(--reason); border-radius: 0 var(--r-sm) var(--r-sm) 0; background: rgba(169, 139, 240, 0.05); }
  .reason-block > summary {
    cursor: pointer; user-select: none; list-style: none; display: flex; align-items: center; gap: 7px;
    padding: 7px 12px; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--reason);
  }
  .reason-block > summary::-webkit-details-marker { display: none; }
  .reason-block > summary .chev { transition: transform var(--dur) var(--ease); color: var(--reason); }
  .reason-block[open] > summary .chev { transform: rotate(90deg); }
  .reason-block .reason-body {
    padding: 0 12px 10px 12px; color: var(--muted); font-style: italic;
    white-space: pre-wrap; word-break: break-word; line-height: 1.55; font-size: 13px;
  }

  /* system + divider lines */
  .blk.sys { font-family: var(--mono); font-size: 12px; color: var(--muted); display: flex; gap: 8px; align-items: baseline; }
  .blk.sys .tag { color: var(--dim); }
  .blk.sys.ok .txt { color: var(--ok); }
  .blk.sys.warn .txt { color: var(--warn); }
  .blk.sys.err .txt { color: var(--err); }
  .blk.divider { font-family: var(--mono); font-size: 11px; color: var(--dim); border-top: 1px dashed var(--border); padding-top: 8px; }

  /* tool cards */
  .tool-card { border: 1px solid var(--border); border-radius: var(--r-md); background: var(--surface-2); overflow: hidden; }
  .tool-card .role { display: flex; align-items: center; gap: 8px; padding: 9px 12px; font-family: var(--mono); font-size: 12.5px; color: var(--text); }
  .tool-card .role .ti { color: var(--muted); display: inline-flex; }
  .tool-card .role .tname { flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool-card pre {
    margin: 0; font-family: var(--mono); font-size: 12px; line-height: 1.45;
    background: var(--bg); border-top: 1px solid var(--border);
    padding: 9px 12px; max-height: 280px; overflow: auto; white-space: pre-wrap; word-break: break-word;
  }
  .tool-card pre.out { color: var(--text-2); }
  .tool-card.err { border-color: var(--err); }
  .pill { font-size: 10px; font-family: var(--mono); padding: 2px 8px; border-radius: var(--r-pill); font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; flex: 0 0 auto; }
  .pill.ok { background: var(--ok-soft); color: var(--ok); }
  .pill.err { background: var(--err-soft); color: var(--err); }
  .pill.run { background: var(--run-soft); color: var(--accent); }

  /* inline approval résumé chip (left in transcript after the modal verdict) */
  .approval-chip {
    display: inline-flex; align-items: center; gap: 8px; align-self: flex-start;
    padding: 7px 12px; border-radius: var(--r-md); font-size: 12.5px;
    border: 1px solid var(--warn); background: var(--warn-soft); color: var(--warn);
  }
  .approval-chip.allowed { border-color: var(--ok); background: var(--ok-soft); color: var(--ok); }
  .approval-chip.denied { border-color: var(--err); background: var(--err-soft); color: var(--err); }
  .approval-chip .ac-tool { font-family: var(--mono); }
  .approval-chip .ac-verdict { font-weight: 700; }

  /* ---- Composer ---- */
  .composer-wrap { flex: 0 0 auto; padding: 12px 20px 18px; }
  .composer-inner { max-width: var(--content-max); margin: 0 auto; }
  .composer {
    display: flex; align-items: flex-end; gap: 8px;
    background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 8px 8px 8px 14px; transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  }
  .composer:focus-within { border-color: var(--border-strong); box-shadow: 0 0 0 3px var(--accent-soft); }
  .composer.disabled { opacity: 0.6; }
  .composer textarea {
    flex: 1 1 auto; min-height: 24px; max-height: 200px; border: none; background: transparent;
    padding: 8px 0; font-size: 14.5px; line-height: 1.5; resize: none; font-family: var(--sans);
  }
  .composer textarea:focus { outline: none; border: none; }
  .send-btn {
    flex: 0 0 auto; width: 38px; height: 38px; border-radius: 50%; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--accent); color: var(--on-accent); border: none;
  }
  .send-btn:not(:disabled):hover { background: var(--accent-press); }
  .send-btn.stopping { background: var(--err-soft); color: var(--err); border: 1px solid var(--err); }
  .send-btn.stopping:hover { background: var(--err); color: #fff; }
  .composer-status {
    display: flex; align-items: center; gap: 8px; margin-top: 9px;
    font-size: 12px; color: var(--muted); font-family: var(--mono);
  }
  .composer-status .spacer { flex: 1 1 auto; }
  .composer-status .keys { color: var(--dim); }
  .think-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); flex: 0 0 auto; }
  .think-dot.on { background: var(--accent); animation: pulse 1s infinite ease-in-out; }

  /* ===================================================================== */
  /* Drawers (Tools / Jobs) + scrim                                        */
  /* ===================================================================== */
  .scrim {
    position: fixed; inset: 0; background: var(--overlay); z-index: 80; opacity: 0;
    transition: opacity var(--dur) var(--ease); pointer-events: none;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 360px; max-width: 90vw; z-index: 90;
    background: var(--surface-1); border-left: 1px solid var(--border);
    box-shadow: var(--shadow-pop); display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform var(--dur) var(--ease); min-height: 0;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .drawer-head .dh-title { font-size: 14px; font-weight: 650; }
  .drawer-head .dh-count { font-size: 12px; color: var(--accent); font-family: var(--mono); }
  .drawer-head .dh-close { margin-left: auto; background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: var(--r-sm); }
  .drawer-head .dh-close:hover { background: var(--surface-2); color: var(--text); }
  .drawer-search { padding: 10px 14px; border-bottom: 1px solid var(--border-faint); }
  .drawer-search input { width: 100%; }
  .drawer-body { overflow-y: auto; flex: 1 1 auto; min-height: 0; padding: 8px; }

  .tool { padding: 9px 11px; border-radius: var(--r-sm); border: 1px solid transparent; }
  .tool:hover { background: var(--surface-2); border-color: var(--border); }
  .tool .name { font-family: var(--mono); font-size: 12.5px; color: var(--text); word-break: break-all; }
  .tool .desc { color: var(--muted); font-size: 12px; margin-top: 3px; line-height: 1.45; }
  .tool .empty, .drawer-body .empty { color: var(--dim); font-size: 12.5px; padding: 8px 4px; }
  .badge {
    display: inline-block; font-size: 10px; font-family: var(--mono);
    padding: 1px 6px; border-radius: var(--r-pill); margin-right: 6px; vertical-align: middle;
    border: 1px solid var(--border); color: var(--muted);
  }
  .badge.mcp { color: var(--accent); border-color: #2a564f; }
  .badge.xai { color: var(--reason); border-color: #443c6e; }

  .job-row { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: var(--r-sm); }
  .job-row:hover { background: var(--surface-2); }
  .job-row .jk { font-family: var(--mono); font-size: 12.5px; color: var(--text); }
  .job-row .jid { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .job-row .jspace { flex: 1 1 auto; }

  /* ===================================================================== */
  /* One-shot / Quick run view                                             */
  /* ===================================================================== */
  .qr-view { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; min-width: 0; }
  .qr-form { flex: 0 0 auto; padding: 18px 20px; border-bottom: 1px solid var(--border); background: var(--surface-1); }
  .qr-inner { max-width: var(--content-max); margin: 0 auto; }
  .qr-form .field { margin-bottom: 12px; }
  .qr-form .actions { display: flex; gap: 10px; align-items: center; }
  .qr-form .actions .hint { margin-left: auto; }
  .stream { flex: 1 1 auto; overflow-y: auto; padding: 18px 20px; min-height: 0; }
  .stream .stream-inner { max-width: var(--content-max); margin: 0 auto; }
  .stream:empty::before { content: "Run a one-shot agent task to stream turns, reasoning, and tool calls here."; color: var(--dim); font-size: 13px; }
  .outcome { flex: 0 0 auto; border-top: 1px solid var(--border); background: var(--surface-2); padding: 16px 20px; max-height: 40%; overflow-y: auto; }
  .outcome.hidden { display: none; }
  .outcome .outcome-inner { max-width: var(--content-max); margin: 0 auto; }
  .outcome h3 { margin: 0 0 10px; font-size: 14px; }
  .outcome .grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 18px; }
  .outcome .grid .k { color: var(--muted); font-size: 12px; font-family: var(--mono); }
  .outcome .grid .v { color: var(--text); font-size: 12.5px; font-family: var(--mono); word-break: break-word; }
  .outcome h4 { margin: 14px 0 6px; font-size: 12px; color: var(--muted); }
  .outcome pre.final { margin: 0; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px; }

  /* ===================================================================== */
  /* Approval modal                                                        */
  /* ===================================================================== */
  .modal-scrim {
    position: fixed; inset: 0; background: var(--overlay); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal {
    width: 100%; max-width: 480px; background: var(--surface-2);
    border: 1px solid var(--border-strong); border-radius: var(--r-lg);
    box-shadow: var(--shadow-pop); padding: 22px;
  }
  .modal .m-head { display: flex; align-items: center; gap: 10px; color: var(--warn); font-weight: 650; font-size: 15px; margin-bottom: 14px; }
  .modal .m-head .m-tool { color: var(--text); font-family: var(--mono); font-size: 13px; }
  .modal pre {
    margin: 0 0 18px; font-family: var(--mono); font-size: 12.5px; line-height: 1.5;
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm);
    padding: 11px 13px; max-height: 240px; overflow: auto; white-space: pre-wrap; word-break: break-word;
  }
  .modal .m-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }
  button.allow { background: var(--ok); color: var(--on-accent); }
  button.allow:not(:disabled):hover { filter: brightness(1.08); }
  button.deny { background: transparent; color: var(--err); border-color: var(--err); }
  button.deny:not(:disabled):hover { background: var(--err-soft); }

  /* ===================================================================== */
  /* Responsive — off-canvas sidebar at <= 960px                           */
  /* ===================================================================== */
  @media (max-width: 960px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); z-index: 90;
      transform: translateX(-100%); transition: transform var(--dur) var(--ease); box-shadow: var(--shadow-pop);
    }
    .sidebar.open { transform: translateX(0); }
    .main { grid-column: 1; }
    .hamburger { display: inline-flex; }
  }
  @media (max-width: 720px) {
    .conv-inner, .composer-inner, .qr-inner, .stream .stream-inner, .outcome .outcome-inner { padding-left: 14px; padding-right: 14px; }
    .turn-user .bubble { max-width: 92%; }
    .picker { max-width: 150px; }
    .picker .pk-txt { display: none; }
    .topbar .server-meta { display: none; }
    .composer-wrap { padding: 10px 14px 14px; }
    .drawer { width: 320px; }
  }
</style>
</head>
<body>
  <div class="app">

      <!-- ============ CHAT (primary) ============ -->
      <div id="chatView" class="qr-view">
        <div class="conversation" id="conversation">
          <!-- empty / start-session state -->
          <div class="empty-state" id="emptyState">

<script>
(function () {
  "use strict";

  // ---- tiny DOM helpers -------------------------------------------------
  const $ = (sel) => document.querySelector(sel);
  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }
  function svg(markup) {
    const span = document.createElement("span");
    span.innerHTML = markup; // static, author-controlled icon markup only
    return span.firstElementChild;
  }
  function pretty(v) {
    if (v == null) return "";
    if (typeof v === "string") return v;
    try { return JSON.stringify(v, null, 2); } catch (e) { return String(v); }
  }
  function errText(error) {
    if (!error) return "error";
    return (error.kind ? error.kind + ": " : "") + (error.message || "error");
  }
  function genId(prefix) {
    return prefix + "-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 7);
  }

  // Author-controlled SVG snippets (no external assets).
  const ICONS = {
    bubble: '<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 4.5A2 2 0 0 1 4 2.5h7a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H6l-3 2.5V10.5H4a2 2 0 0 1-2-2v-4Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>',
    diamond: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1 13 7 7 13 1 7 7 1Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M7 4 10 7 7 10 4 7 7 4Z" fill="currentColor"/></svg>',
    tool: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4.5 1.5 1.5 4.5l3 3M9.5 12.5l3-3-3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    copy: '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="4" y="4" width="7" height="7" rx="1.4" stroke="currentColor" stroke-width="1.2"/><path d="M9 4V3A1.4 1.4 0 0 0 7.6 1.6H3A1.4 1.4 0 0 0 1.6 3v4.6A1.4 1.4 0 0 0 3 9h1" stroke="currentColor" stroke-width="1.2"/></svg>',
    check: '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2.5 7l3 3 5-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    chevron: '<svg class="chev" width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M4 3l3 2.5L4 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    warn: '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2 16.5 15.5h-15L9 2Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M9 7v3.5M9 12.8v.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
  };

  // ---- daemon auth token ------------------------------------------------
  // The daemon gates /rpc and /events with a per-run bearer token. On a
  // loopback bind it injects the token below (zero-config local UI); on a
  // remote bind it is supplied via the URL fragment (#token=...), which the
  // browser never sends to the server.
  const DAEMON_TOKEN = (function () {
    const injected = "__NERVE_DAEMON_TOKEN__";
    if (injected.indexOf("NERVE_DAEMON_TOKEN") === -1) return injected;
    const m = /[#&]token=([^&]+)/.exec(window.location.hash || "");
    return m ? decodeURIComponent(m[1]) : "";
  })();
  function authHeaders(base) {
    const h = Object.assign({}, base);
    if (DAEMON_TOKEN) h["Authorization"] = "Bearer " + DAEMON_TOKEN;
    return h;
  }
  function eventsUrl() {
    return DAEMON_TOKEN
      ? "/events?token=" + encodeURIComponent(DAEMON_TOKEN)
      : "/events";
  }

  // ---- JSON-RPC over POST /rpc -----------------------------------------
  let rpcId = 0;
  async function rpc(method, params) {
    const payload = { jsonrpc: "2.0", id: ++rpcId, method: method };
    if (params !== undefined) payload.params = params;
    const res = await fetch("/rpc", {
      method: "POST",
      headers: authHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    if (json && json.error) {
      throw new Error(json.error.message || ("rpc error " + json.error.code));
    }
    return json ? json.result : undefined;
  }

  function setStatus(state, text) {
    $("#statusDot").className = "dot " + state;
    $("#statusText").textContent = text;
  }

  // ---- unified job registry --------------------------------------------
  // Every operation is a runtime job; we correlate its terminal lifecycle
  // event (job_completed / job_failed / job_cancelled) back to what it was.
  const jobs = new Map(); // job_id -> { kind, id }

  async function startJob(kind, command) {
    const id = genId(kind);
    jobs.set(id, { kind, id });
    refreshJobCount();
    try {
      await rpc("runtime/jobs/start", { job_id: id, command });
      return id;
    } catch (e) {
      jobs.delete(id);
      refreshJobCount();
      throw e;
    }
  }

  // ---- markdown renderer (authored, dependency-free, XSS-safe) ----------
  // Renders a buffered raw string into sanitized DOM nodes. Code text is set
  // via textContent only; inline HTML is never injected from model output.
  // Tolerates an unterminated trailing ``` fence during streaming.
  function escapeText(s) { return s; } // textContent already escapes; kept for clarity

  function renderInline(parent, text) {
    // Tokenize a single line of prose: `code`, **bold**, *italic*, [link](url).
    const re = /(`[^`]+`)|(\*\*[^*]+\*\*)|(\*[^*]+\*)|(\[[^\]]+\]\([^)]+\))/g;
    let last = 0, m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) parent.append(document.createTextNode(text.slice(last, m.index)));
      const tok = m[0];
      if (tok[0] === "`") {
        parent.append(el("code", "inline", tok.slice(1, -1)));
      } else if (tok.startsWith("**")) {
        parent.append(el("strong", null, tok.slice(2, -2)));
      } else if (tok[0] === "*") {
        parent.append(el("em", null, tok.slice(1, -1)));
      } else {
        const close = tok.indexOf("](");
        const label = tok.slice(1, close);
        const url = tok.slice(close + 2, -1);
        const safe = /^(https?:|mailto:)/i.test(url) ? url : "#";
        const a = el("a", null, label);
        a.href = safe; a.target = "_blank"; a.rel = "noopener noreferrer";
        parent.append(a);
      }
      last = re.lastIndex;
    }
    if (last < text.length) parent.append(document.createTextNode(text.slice(last)));
  }

  function makeCodeBlock(lang, code) {
    const wrap = el("div", "code-block");
    const head = el("div", "cb-head");
    head.append(el("span", "cb-lang", lang || "text"));
    const copy = el("button", "cb-copy");
    copy.type = "button";
    copy.append(svg(ICONS.copy), el("span", null, "Copy"));
    copy.addEventListener("click", () => {
      const done = () => {
        copy.classList.add("copied");
        copy.lastChild.textContent = "Copied";
        setTimeout(() => { copy.classList.remove("copied"); copy.lastChild.textContent = "Copy"; }, 1400);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(code).then(done).catch(() => {});
      } else { done(); }
    });
    head.append(copy);
    wrap.append(head);
    const pre = el("pre");
    const codeEl = el("code");
    codeEl.textContent = code; // text only — never innerHTML
    pre.append(codeEl);
    wrap.append(pre);
    return wrap;
  }

  function renderMarkdownInto(host, raw) {
    host.textContent = "";
    const lines = (raw || "").split("\n");
    let i = 0;
    let list = null, listOrdered = false;
    const flushList = () => { if (list) { host.append(list); list = null; } };
    while (i < lines.length) {
      const line = lines[i];
      // fenced code block (tolerate an unterminated trailing fence)
      const fence = /^```(.*)$/.exec(line);
      if (fence) {
        flushList();
        const lang = fence[1].trim();
        const body = [];
        i++;
        while (i < lines.length && !/^```/.test(lines[i])) { body.push(lines[i]); i++; }
        if (i < lines.length) i++; // consume closing fence if present
        host.append(makeCodeBlock(lang, body.join("\n")));
        continue;
      }
      // heading
      const h = /^(#{1,4})\s+(.*)$/.exec(line);
      if (h) { flushList(); const tag = "h" + h[1].length; const node = el(tag); renderInline(node, h[2]); host.append(node); i++; continue; }
      // hr
      if (/^\s*(---|\*\*\*|___)\s*$/.test(line)) { flushList(); host.append(el("hr")); i++; continue; }
      // blockquote
      const bq = /^>\s?(.*)$/.exec(line);
      if (bq) { flushList(); const node = el("blockquote"); renderInline(node, bq[1]); host.append(node); i++; continue; }
      // list item
      const ol = /^\s*(\d+)[.)]\s+(.*)$/.exec(line);
      const ul = /^\s*[-*+]\s+(.*)$/.exec(line);
      if (ol || ul) {
        const ordered = !!ol;
        if (!list || listOrdered !== ordered) { flushList(); list = el(ordered ? "ol" : "ul"); listOrdered = ordered; }
        const li = el("li"); renderInline(li, (ol ? ol[2] : ul[1])); list.append(li); i++; continue;
      }
      // blank line
      if (line.trim() === "") { flushList(); i++; continue; }
      // paragraph (gather consecutive non-special lines)
      flushList();
      const para = [line]; i++;
      while (i < lines.length && lines[i].trim() !== "" && !/^```/.test(lines[i]) &&
             !/^(#{1,4})\s/.test(lines[i]) && !/^>\s?/.test(lines[i]) &&
             !/^\s*\d+[.)]\s/.test(lines[i]) && !/^\s*[-*+]\s/.test(lines[i])) { para.push(lines[i]); i++; }
      const p = el("p"); renderInline(p, para.join("\n")); host.append(p);
    }
    flushList();
  }

  // =======================================================================
  // CHAT (primary surface) — multi-turn session.* over /rpc + /events
  // =======================================================================
  const chat = {
    session: null,        // { id, provider, model } once started
    pending: null,        // { provider, model } captured at session.start
    starting: false,      // a session.start job is in flight
    phase: "idle",        // idle | thinking
    turnEl: null,         // active assistant-turn container
    curMsg: null,         // streaming assistant-text block { el, raw }
    curReason: null,      // streaming reasoning disclosure { details, body }
    lastTool: null,       // last tool card awaiting its tool_finished
    approvals: new Map(), // request_id -> { resolve }
    firstUserText: null,  // cosmetic title for the thread row
  };

  // Cosmetic, client-side recents (honest: one live session + past rows).
  const threads = []; // { id, title, sub, live }

  function transcript() { return $("#transcript"); }
  function autoscroll() {
    const t = $("#conversation");
    if (t.scrollHeight - t.scrollTop - t.clientHeight < 160) t.scrollTop = t.scrollHeight;
  }
  function turnBody() { return chat.turnEl ? chat.turnEl.querySelector(".turn-body") : null; }

  function chatSys(text, cls) {
    const host = turnBody() || transcript();
    const b = el("div", "blk sys " + (cls || ""));
    b.append(el("span", "tag", "•"), el("span", "txt", text));
    host.append(b);
    autoscroll();
  }

  function addUserBubble(text) {
    const wrap = el("div", "turn-user");
    wrap.append(el("div", "bubble", text));
    transcript().append(wrap);
    autoscroll();
  }

  function startAssistantTurn() {
    const turn = el("div", "turn-assistant");
    const head = el("div", "turn-head");
    const avatar = el("span", "avatar");
    avatar.append(svg(ICONS.diamond));
    head.append(avatar);
    head.append(el("span", "label", "assistant"));
    const status = el("span", "turn-status thinking");
    status.append(el("span", null, "thinking"));
    const typing = el("span", "typing");
    typing.append(el("i"), el("i"), el("i"));
    status.append(typing);
    head.append(status);
    turn.append(head);
    turn.append(el("div", "turn-body"));
    transcript().append(turn);
    chat.turnEl = turn;
    chat.curMsg = null;
    chat.curReason = null;
    chat.lastTool = null;
    autoscroll();
  }

  function finalizeTurn() {
    if (chat.turnEl) {
      const s = chat.turnEl.querySelector(".turn-status");
      if (s) { s.className = "turn-status"; s.textContent = ""; }
      // Collapse reasoning once the turn is finalized.
      if (chat.curReason && chat.curReason.details) chat.curReason.details.open = false;
      // Any approval still pending was abandoned (interrupt / turn end).
      chat.approvals.forEach((a) => { if (a.close) a.close("stale"); });
      chat.approvals.clear();
      closeApprovalModal();
    }
    chat.curMsg = null;
    chat.curReason = null;
    chat.lastTool = null;
  }

  function appendAssistantText(text) {
    const body = turnBody();
    if (!body) return;
    if (!chat.curMsg) {
      const node = el("div", "blk msg md");
      body.append(node);
      chat.curMsg = { el: node, raw: "" };
    }
    chat.curMsg.raw += text;
    renderMarkdownInto(chat.curMsg.el, chat.curMsg.raw);
    autoscroll();
  }
  function appendReasoning(text) {
    const body = turnBody();
    if (!body) return;
    if (!chat.curReason) {
      const details = el("details", "reason-block");
      details.open = true;
      const summary = el("summary");
      summary.append(svg(ICONS.chevron), el("span", null, "Reasoning"));
      const rbody = el("div", "reason-body");
      details.append(summary, rbody);
      body.append(details);
      chat.curReason = { details, body: rbody };
    }
    chat.curReason.body.textContent += text;
    autoscroll();
  }

  function addToolCard(tool, args) {
    const body = turnBody();
    if (!body) return null;
    const card = el("div", "tool-card");
    const role = el("div", "role");
    role.append(svg(ICONS.tool));
    role.append(el("span", "tname", tool || "tool"));
    role.append(el("span", "pill run", "run"));
    card.append(role);
    const pre = el("pre", "args");
    pre.textContent = pretty(args);
    card.append(pre);
    body.append(card);
    autoscroll();
    return card;
  }
  function finishToolCard(tool, ok, output) {
    const card = chat.lastTool;
    chat.lastTool = null;
    if (!card) return;
    if (!ok) card.classList.add("err");
    const role = card.querySelector(".role");
    role.textContent = "";
    role.append(svg(ICONS.tool));
    role.append(el("span", "tname", tool || "tool"));
    role.append(el("span", "pill " + (ok ? "ok" : "err"), ok ? "ok" : "error"));
    const out = el("pre", "out");
    out.textContent = output || "";
    card.append(out);
    autoscroll();
  }

  // ---- approval prompt (modal + inline résumé chip) ----
  function closeApprovalModal() {
    const host = $("#approvalHost");
    if (host) host.textContent = "";
  }

  function addApprovalChip(tool, state) {
    const body = turnBody();
    if (!body) return;
    const allowed = state === "allow" || state === "allow_always";
    const denied = state === "deny" || state === "deny_always";
    const labels = {
      allow: "allowed",
      allow_always: "allowed for session",
      deny: "denied",
      deny_always: "always denied",
    };
    const chip = el("div", "approval-chip " + (allowed ? "allowed" : denied ? "denied" : ""));
    chip.append(svg(ICONS.warn));
    chip.append(el("span", "ac-tool", tool || "tool"));
    chip.append(el("span", "ac-verdict", labels[state] || "closed"));
    body.append(chip);
    autoscroll();
  }

  function addApprovalCard(requestId, tool, args) {
    // Render a centered modal overlay; a résumé chip is left in the transcript
    // on verdict so the in-context history survives.
    closeApprovalModal();
    const host = $("#approvalHost");
    const scrim = el("div", "modal-scrim");
    const modal = el("div", "modal");
    modal.setAttribute("role", "dialog");
    modal.setAttribute("aria-modal", "true");
    const head = el("div", "m-head");
    head.append(svg(ICONS.warn));
    head.append(el("span", null, "Approval requested ·"));
    head.append(el("span", "m-tool", tool || "tool"));
    modal.append(head);
    const pre = el("pre", null, pretty(args));
    modal.append(pre);
    const actions = el("div", "m-actions");
    const allow = el("button", "allow", "Allow");
    const allowAlways = el("button", "allow", "Allow for session");
    const deny = el("button", "deny", "Deny");
    const denyAlways = el("button", "deny", "Always deny");
    actions.append(allow, allowAlways, deny, denyAlways);
    modal.append(actions);
    scrim.append(modal);
    host.append(scrim);
    allow.focus();

    const close = (verdict) => {
      addApprovalChip(tool, verdict);
      closeApprovalModal();
    };
    allow.addEventListener("click", () => respond(requestId, "allow", close));
    allowAlways.addEventListener("click", () => respond(requestId, "allow_always", close));
    deny.addEventListener("click", () => respond(requestId, "deny", close));
    denyAlways.addEventListener("click", () => respond(requestId, "deny_always", close));
    chat.approvals.set(requestId, { close });
  }

  async function respond(requestId, decision, close) {
    if (close) close(decision);
    chat.approvals.delete(requestId);
    try {
      await startJob("respond", {
        kind: "session.respond",
        session_id: chat.session.id,
        request_id: requestId,
        decision: decision,
      });
    } catch (e) {
      chatSys("respond failed: " + e.message, "err");
    }
  }

  // ---- chat control state ----
  function setSendStop(thinking) {
    const btn = $("#send");
    btn.classList.toggle("stopping", thinking);
    btn.querySelector(".ic-send").classList.toggle("hidden", thinking);
    btn.querySelector(".ic-stop").classList.toggle("hidden", !thinking);
    btn.setAttribute("aria-label", thinking ? "Stop" : "Send");
  }
  function refreshChatControls() {
    const haveSession = !!chat.session;
    const thinking = chat.phase === "thinking";
    $("#msg").disabled = !haveSession;
    // The send button morphs into a stop button while streaming.
    $("#send").disabled = haveSession ? false : true;
    setSendStop(haveSession && thinking);
    $("#composer").classList.toggle("disabled", !haveSession);
    $("#start").disabled = chat.starting;
    const dot = $("#thinkDot");
    dot.className = "think-dot" + (thinking ? " on" : "");
    $("#thinkText").textContent = !haveSession ? "no session" : thinking ? "thinking…" : "ready";
    if (!haveSession) $("#msg").placeholder = "Start a session to chat…";
    else $("#msg").placeholder = "Message Nerve…";
  }

  function setThinking(on) {
    chat.phase = on ? "thinking" : "idle";
    if (!on && chat.turnEl) {
      const s = chat.turnEl.querySelector(".turn-status");
      if (s) { s.className = "turn-status"; s.textContent = ""; }
    }
    refreshChatControls();
  }

  function markInvalid(node, bad) { node.classList.toggle("invalid", bad); }

  // ---- start a session ----
  async function startSession() {
    if (chat.starting || chat.session) return;
    const provider = $("#provider").value.trim();
    const model = $("#model").value.trim();
    markInvalid($("#provider"), !provider);
    markInvalid($("#model"), !model);
    if (!provider || !model) { $("#startHint").textContent = "provider and model are required"; return; }

    const command = { kind: "session.start", provider: provider, model: model };
    const sysP = $("#system").value.trim(); if (sysP) command.system_prompt = sysP;
    const agentN = $("#agent").value.trim(); if (agentN) command.agent = agentN;
    const resume = $("#resume").value.trim(); if (resume) command.resume = resume;
    const mt = $("#maxTurns").value.trim(); if (mt) { const n = parseInt(mt, 10); if (!isNaN(n)) command.max_turns = n; }
    const temp = $("#temp").value.trim(); if (temp) { const f = parseFloat(temp); if (!isNaN(f)) command.temperature = f; }
    const effort = $("#effort").value.trim(); if (effort) command.reasoning_effort = effort;
    const tf = $("#toolFilterIn").value.trim();
    if (tf) { const list = tf.split(",").map((s) => s.trim()).filter(Boolean); if (list.length) command.tool_filter = list; }

    chat.starting = true;
    chat.pending = { provider, model };
    $("#startHint").textContent = "starting…";
    refreshChatControls();
    try {
      await startJob("start", command);
    } catch (e) {
      chat.starting = false;
      $("#startHint").textContent = "failed: " + e.message;
      refreshChatControls();
    }
  }

  function renderTopbarSession() {
    const s = chat.session;
    // Reads chat.session.provider / chat.session.model / chat.session.id so the
    // session.provider, session.model and session.id facets stay surfaced.
    const provider = s ? s.provider : ($("#provider").value.trim() || "anthropic");
    const model = s ? s.model : ($("#model").value.trim() || "model");
    $("#modelPickText").textContent = provider + " / " + model;
    if (s) {
      $("#convSub").textContent = "#" + (s.id || "").slice(0, 8);
      $("#convSub").title = "session.id " + s.id;
    } else {
      $("#convSub").textContent = "";
    }
  }

  function renderThreads() {
    const host = $("#threads");
    host.textContent = "";
    if (threads.length === 0) {
      host.append(el("div", "empty", "No conversation yet."));
      return;
    }
    for (const t of threads) {
      const row = el("div", "thread-row" + (t.live ? " active" : ""));
      const ic = svg(ICONS.bubble); ic.classList.add("ti");
      row.append(ic);
      row.append(el("span", "tt", t.title || "Conversation"));
      if (t.live) row.append(el("span", "live-dot"));
      row.title = t.sub || "";
      row.addEventListener("click", () => { setMode("chat"); closeAllDrawers(); });
      host.append(row);
    }
  }

  function adoptSession(id) {
    chat.session = { id: id, provider: chat.pending ? chat.pending.provider : "", model: chat.pending ? chat.pending.model : "" };
    chat.starting = false;
    $("#startHint").textContent = "";
    $("#emptyState").classList.add("hidden");
    $("#convInnerWrap").classList.remove("hidden");
    $("#convTitle").textContent = "New chat";
    // Cosmetic recents: bind the active thread row to chat.session.id.
    threads.unshift({ id: chat.session.id, title: "New chat", sub: chat.session.provider + " / " + chat.session.model, live: true });
    renderThreads();
    renderTopbarSession();
    refreshChatControls();
    $("#msg").focus();
  }

  function resetChat() {
    if (chat.session) {
      const idx = threads.findIndex((t) => t.id === chat.session.id);
      if (idx >= 0) threads[idx].live = false;
    }
    chat.session = null;
    chat.pending = null;
    chat.starting = false;
    chat.phase = "idle";
    chat.turnEl = null;
    chat.curMsg = null;
    chat.curReason = null;
    chat.lastTool = null;
    chat.firstUserText = null;
    chat.approvals.clear();
    closeApprovalModal();
    transcript().textContent = "";
    $("#emptyState").classList.remove("hidden");
    $("#convInnerWrap").classList.add("hidden");
    $("#convTitle").textContent = "New chat";
    $("#convSub").textContent = "";
    $("#startHint").textContent = "";
    renderThreads();
    renderTopbarSession();
    refreshChatControls();
  }

  // ---- send a message ----
  async function send() {
    if (!chat.session) return;
    if (chat.phase === "thinking") { interrupt(); return; }
    const text = $("#msg").value.trim();
    if (!text) return;
    $("#msg").value = "";
    autoGrow($("#msg"));
    if (!chat.firstUserText) {
      chat.firstUserText = text;
      const title = text.length > 40 ? text.slice(0, 38) + "…" : text;
      $("#convTitle").textContent = title;
      const row = threads.find((t) => t.id === chat.session.id);
      if (row) { row.title = title; renderThreads(); }
    }
    addUserBubble(text);
    startAssistantTurn();
    setThinking(true);
    try {
      await startJob("message", { kind: "session.message", session_id: chat.session.id, text: text });
    } catch (e) {
      chatSys("failed to send: " + e.message, "err");
      setThinking(false);
    }
  }

  async function interrupt() {
    if (!chat.session) return;
    try {
      await startJob("interrupt", { kind: "session.interrupt", session_id: chat.session.id });
      chatSys("⏹ interrupt requested", "warn");
    } catch (e) {
      chatSys("interrupt failed: " + e.message, "err");
    }
  }

  async function newSession() {
    if (chat.session) {
      try { await startJob("close", { kind: "session.close", session_id: chat.session.id }); } catch (e) { /* best effort */ }
    }
    setMode("chat");
    closeAllDrawers();
    resetChat();
  }

  // ---- live model/provider switch (additive: session.set_model) ----
  function openModelPop() {
    const s = chat.session;
    $("#popProvider").value = s ? s.provider : $("#provider").value;
    $("#popModel").value = s ? s.model : $("#model").value;
    $("#modelPop").classList.remove("hidden");
    $("#popProvider").focus();
  }
  function closeModelPop() { $("#modelPop").classList.add("hidden"); }
  async function applyModelPick() {
    const provider = $("#popProvider").value.trim();
    const model = $("#popModel").value.trim();
    if (!model) { return; }
    if (chat.session) {
      // Live session: switch provider/model in place via session.set_model.
      const command = { kind: "session.set_model", session_id: chat.session.id, model: model };
      if (provider) command.provider = provider;
      chat.session.provider = provider || chat.session.provider; // session.provider
      chat.session.model = model;                                // session.model
      renderTopbarSession();
      const row = threads.find((t) => t.id === chat.session.id);
      if (row) { row.sub = chat.session.provider + " / " + chat.session.model; renderThreads(); }
      try { await startJob("setmodel", command); }
      catch (e) { chatSys("set model failed: " + e.message, "err"); }
    } else {
      // Pre-session: just seed the start-card inputs.
      if (provider) $("#provider").value = provider;
      $("#model").value = model;
      renderTopbarSession();
    }
    closeModelPop();
  }

  // ---- session event handling ----
  function isCurrent(sessionId) { return chat.session && sessionId === chat.session.id; }

  function onSessionStarted(sessionId) {
    // Bootstrapping event: adopt while a start is in flight and unclaimed.
    if (chat.starting && !chat.session) adoptSession(sessionId);
  }
  function onTurnStarted(sessionId) {
    if (!isCurrent(sessionId)) return;
    if (!chat.turnEl) startAssistantTurn();
    setThinking(true);
  }
  function onSessionIdle(sessionId) {
    if (!isCurrent(sessionId)) return;
    finalizeTurn();
    setThinking(false);
  }
  function onSessionClosed(sessionId) {
    if (!isCurrent(sessionId)) return;
    chatSys("session closed", "warn");
    resetChat();
  }
  function onApprovalRequested(ev) {
    if (!isCurrent(ev.session_id)) return;
    if (!chat.turnEl) startAssistantTurn();
    addApprovalCard(ev.request_id, ev.tool, ev.arguments);
  }
  function onSessionAgent(sessionId, a) {
    if (!isCurrent(sessionId)) return;
    if (!chat.turnEl) startAssistantTurn();
    switch (a.kind) {
      case "turn_started":
        chat.curMsg = null; chat.curReason = null;
        if (a.turn && a.turn > 1) turnBody().append(el("div", "blk divider", "step " + a.turn));
        break;
      case "message": chat.curReason = null; appendAssistantText(a.text || ""); break;
      case "reasoning": chat.curMsg = null; appendReasoning(a.text || ""); break;
      case "tool_started":
        chat.curMsg = null; chat.curReason = null;
        chat.lastTool = addToolCard(a.tool, a.arguments);
        break;
      case "tool_finished":
        chat.curMsg = null; chat.curReason = null;
        finishToolCard(a.tool, !!a.ok, a.output);
        break;
      case "interrupted":
        chat.curMsg = null; chat.curReason = null;
        chatSys("interrupted: " + (a.reason || ""), "warn");
        break;
      default: break;
    }
  }

  // ---- chat job terminals ----
  function chatStartTerminal(job, kind, error) {
    if (kind === "completed") {
      // session_started normally already adopted the id; fall back to the result.
      if (!chat.session) {
        rpc("runtime/jobs/get", { job_id: job.id, include_result: true })
          .then((r) => { const id = r && r.job && r.job.result && r.job.result.session_id; if (id) adoptSession(id); })
          .catch(() => {});
      }
      return;
    }
    chat.starting = false;
    $("#startHint").textContent = "session.start " + kind + (error ? ": " + errText(error) : "");
    refreshChatControls();
  }
  function chatMessageTerminal(kind, error) {
    setThinking(false);
    finalizeTurn();
    if (kind === "failed" && error) chatSys("× turn failed · " + errText(error), "err");
    else if (kind === "cancelled") chatSys("turn cancelled", "warn");
  }

  // =======================================================================
  // ONE-SHOT (secondary surface) — agent.run jobs
  // =======================================================================
  const one = { jobId: null, running: false, turnEl: null, curMsg: null, curReason: null, lastTool: null };

  function osStream() { return $("#osStreamInner"); }
  function osScroll() { const s = $("#osStream"); if (s.scrollHeight - s.scrollTop - s.clientHeight < 120) s.scrollTop = s.scrollHeight; }
  function osTurn() { return one.turnEl ? one.turnEl.querySelector(".turn-body") : null; }
  function osSys(text, cls) {
    const host = osTurn() || osStream();
    const b = el("div", "blk sys " + (cls || ""));
    b.append(el("span", "tag", "•"), el("span", "txt", text));
    host.append(b); osScroll();
  }
  function osNewTurn(n) {
    const turn = el("div", "turn-assistant");
    const head = el("div", "turn-head");
    const avatar = el("span", "avatar");
    avatar.append(svg(ICONS.diamond));
    head.append(avatar);
    head.append(el("span", "label", "turn " + n));
    turn.append(head); turn.append(el("div", "turn-body"));
    osStream().append(turn);
    one.turnEl = turn; one.curMsg = null; one.curReason = null; one.lastTool = null;
    osScroll();
  }
  function osText(text) {
    const body = osTurn(); if (!body) { osNewTurn(1); }
    if (!one.curMsg) { const node = el("div", "blk msg md"); osTurn().append(node); one.curMsg = { el: node, raw: "" }; }
    one.curMsg.raw += text; renderMarkdownInto(one.curMsg.el, one.curMsg.raw); osScroll();
  }
  function osReason(text) {
    const body = osTurn(); if (!body) { osNewTurn(1); }
    if (!one.curReason) {
      const details = el("details", "reason-block"); details.open = true;
      const summary = el("summary"); summary.append(svg(ICONS.chevron), el("span", null, "Reasoning"));
      const rbody = el("div", "reason-body"); details.append(summary, rbody);
      osTurn().append(details); one.curReason = { body: rbody };
    }
    one.curReason.body.textContent += text; osScroll();
  }
  function osToolStart(tool, args) {
    const body = osTurn(); if (!body) osNewTurn(1);
    const card = el("div", "tool-card");
    const role = el("div", "role");
    role.append(svg(ICONS.tool));
    role.append(el("span", "tname", tool || "tool"));
    role.append(el("span", "pill run", "run"));
    card.append(role);
    const pre = el("pre", "args"); pre.textContent = pretty(args); card.append(pre);
    osTurn().append(card); one.lastTool = card; osScroll();
  }
  function osToolFinish(tool, ok, output) {
    const card = one.lastTool; one.lastTool = null;
    if (!card) return;
    if (!ok) card.classList.add("err");
    const role = card.querySelector(".role"); role.textContent = "";
    role.append(svg(ICONS.tool));
    role.append(el("span", "tname", tool || "tool"));
    role.append(el("span", "pill " + (ok ? "ok" : "err"), ok ? "ok" : "error"));
    const out = el("pre", "out"); out.textContent = output || ""; card.append(out); osScroll();
  }

  function osSetRunning(on) {
    one.running = on;
    $("#osRun").disabled = on;
    $("#osCancel").disabled = !on;
    $("#osRun").textContent = on ? "Running…" : "Run";
  }
  function osHideOutcome() { const o = $("#osOutcome"); o.classList.add("hidden"); o.textContent = ""; }

  async function osRunTask() {
    if (one.running) return;
    const provider = $("#osProvider").value.trim();
    const model = $("#osModel").value.trim();
    const task = $("#osTask").value.trim();
    markInvalid($("#osProvider"), !provider);
    markInvalid($("#osModel"), !model);
    markInvalid($("#osTask"), !task);
    if (!provider || !model || !task) { $("#osHint").textContent = "provider, model, and task are required"; return; }

    osStream().textContent = ""; one.turnEl = null; osHideOutcome();
    osSetRunning(true);
    const command = { kind: "agent.run", provider: provider, model: model, task: task };
    osSys("starting agent.run · " + provider + " / " + model);
    try {
      one.jobId = await startJob("oneshot", command);
      $("#osHint").textContent = one.jobId;
    } catch (e) {
      osSys("failed to start: " + e.message, "err");
      osSetRunning(false);
    }
  }
  async function osCancelTask() {
    if (!one.jobId) return;
    try { await rpc("runtime/jobs/cancel", { job_id: one.jobId }); osSys("cancel requested", "warn"); }
    catch (e) { osSys("cancel failed: " + e.message, "err"); }
  }
  function onOneShotAgent(jobId, a) {
    if (jobId !== one.jobId) return;
    switch (a.kind) {
      case "turn_started": osNewTurn(a.turn); break;
      case "message": one.curReason = null; osText(a.text || ""); break;
      case "reasoning": one.curMsg = null; osReason(a.text || ""); break;
      case "tool_started": one.curMsg = null; one.curReason = null; osToolStart(a.tool, a.arguments); break;
      case "tool_finished": one.curMsg = null; one.curReason = null; osToolFinish(a.tool, !!a.ok, a.output); break;
      case "interrupted": osSys("interrupted: " + (a.reason || ""), "warn"); break;
      default: break;
    }
  }
  async function osTerminal(kind, error) {
    if (error) osSys("job failed · " + errText(error), "err");
    else osSys("job " + kind, kind === "completed" ? "ok" : "warn");
    osSetRunning(false);
    if (!one.jobId) return;
    try {
      const r = await rpc("runtime/jobs/get", { job_id: one.jobId, include_result: true });
      if (r && r.job) osRenderOutcome(r.job);
    } catch (e) { osSys("could not fetch result: " + e.message, "err"); }
  }
  function osRenderOutcome(job) {
    const o = $("#osOutcome");
    o.textContent = ""; o.classList.remove("hidden");
    const inner = el("div", "outcome-inner");
    inner.append(el("h3", null, "Outcome"));
    const grid = el("div", "grid");
    const add = (k, v) => { grid.append(el("div", "k", k), el("div", "v", v == null ? "—" : String(v))); };
    add("status", job.status);
    const r = job.result || {};
    if (job.error) add("error", errText(job.error));
    if (r.reason != null) add("reason", r.reason);
    if (r.turns != null) add("turns", r.turns);
    if (r.usage) { add("input tokens", r.usage.input_tokens); add("output tokens", r.usage.output_tokens); }
    inner.append(grid);
    if (r.final_text) {
      inner.append(el("h4", null, "Final text"));
      const pre = el("pre", "final"); pre.textContent = r.final_text; inner.append(pre);
    }
    o.append(inner);
  }

  // =======================================================================
  // Shared event dispatch (SSE) — route by event type, then by id
  // =======================================================================
  function onJobTerminal(jobId, kind, error) {
    const job = jobs.get(jobId);
    if (!job) return;
    jobs.delete(jobId);
    refreshJobCount();
    switch (job.kind) {
      case "oneshot": osTerminal(kind, error); break;
      case "start": chatStartTerminal(job, kind, error); break;
      case "message": chatMessageTerminal(kind, error); break;
      case "respond":
      case "interrupt":
      case "setmodel":
      case "close":
        if (kind !== "completed" && error) chatSys("× " + job.kind + " failed: " + errText(error), "err");
        break;
      default: break;
    }
  }

  function handleEvent(ev) {
    if (!ev || typeof ev !== "object") return;
    switch (ev.type) {
      // job lifecycle (carry job_id)
      case "job_started": break;
      case "job_progress": break;
      case "job_cancel_requested": break;
      case "job_completed": onJobTerminal(ev.job_id, "completed", null); break;
      case "job_failed": onJobTerminal(ev.job_id, "failed", ev.error); break;
      case "job_cancelled": onJobTerminal(ev.job_id, "cancelled", null); break;
      // one-shot agent steps (carry job_id)
      case "agent": onOneShotAgent(ev.job_id, ev.event || {}); break;
      // session lifecycle + steps (carry session_id)
      case "session_started": onSessionStarted(ev.session_id); break;
      case "turn_started": onTurnStarted(ev.session_id); break;
      case "session_idle": onSessionIdle(ev.session_id); break;
      case "session_closed": onSessionClosed(ev.session_id); break;
      case "session_agent": onSessionAgent(ev.session_id, ev.event || {}); break;
      case "approval_requested": onApprovalRequested(ev); break;
      default: break;
    }
  }

  function connectEvents() {
    let es;
    try { es = new EventSource(eventsUrl()); }
    catch (e) { setStatus("err", "events unavailable"); return; }
    es.onopen = () => setStatus("ok", "connected");
    es.onerror = () => setStatus("warn", "reconnecting…");
    es.onmessage = (e) => {
      let note;
      try { note = JSON.parse(e.data); } catch (err) { return; }
      if (!note || note.method !== "runtime/event") return;
      handleEvent(note.params || {});
    };
  }

  // =======================================================================
  // Info + tool catalog + jobs drawer
  // =======================================================================
  let serverCaps = null;
  function renderInfo(info) {
    if (!info) return;
    const name = (info.serverInfo && info.serverInfo.name) || "nerve";
    const version = (info.serverInfo && info.serverInfo.version) || "?";
    const proto = info.protocolVersion || "?";
    $("#workspaceName").textContent = name;
    const meta = $("#serverMeta");
    meta.textContent = "";
    meta.append(el("b", null, "v" + version));
    meta.append(document.createTextNode("  ·  protocol v" + proto));
    serverCaps = info.capabilities && info.capabilities.jobs && info.capabilities.jobs.commandKinds;
    if (Array.isArray(serverCaps) && serverCaps.indexOf("session.start") === -1) {
      setStatus("warn", "daemon lacks session.start");
    }
  }

  let allTools = [];
  function nsBadge(name) {
    if (name.indexOf("mcp__") === 0) return { cls: "mcp", text: "mcp" };
    if (name.indexOf("xai_") === 0 || name.indexOf("xai__") === 0) return { cls: "xai", text: "xai" };
    return null;
  }
  function renderTools(tools) {
    allTools = Array.isArray(tools) ? tools : [];
    $("#toolCount").textContent = allTools.length;
    $("#toolCountDrawer").textContent = "(" + allTools.length + ")";
    paintTools("");
  }
  function paintTools(filter) {
    const host = $("#tools");
    host.textContent = "";
    const f = filter.toLowerCase();
    let shown = 0;
    for (const t of allTools) {
      const name = t.name || "";
      const desc = t.description || "";
      if (f && (name + " " + desc).toLowerCase().indexOf(f) === -1) continue;
      shown++;
      const item = el("div", "tool");
      const nameEl = el("div", "name");
      const badge = nsBadge(name);
      if (badge) nameEl.append(el("span", "badge " + badge.cls, badge.text));
      nameEl.append(document.createTextNode(name));
      item.append(nameEl);
      if (desc) {
        const d = desc.length > 220 ? desc.slice(0, 217) + "…" : desc;
        item.append(el("div", "desc", d));
      }
      item.title = desc;
      host.append(item);
    }
    if (shown === 0) host.append(el("div", "empty", allTools.length ? "No tools match the filter." : "No tools reported."));
  }

  function refreshJobCount() {
    const n = jobs.size;
    $("#jobCount").textContent = n;
    $("#jobCountDrawer").textContent = "(" + n + ")";
    if (!$("#jobsDrawer").classList.contains("open")) return;
    renderJobs();
  }
  function renderJobs() {
    const host = $("#jobsList");
    host.textContent = "";
    if (jobs.size === 0) { host.append(el("div", "empty", "No active jobs.")); return; }
    jobs.forEach((job) => {
      const row = el("div", "job-row");
      row.append(el("span", "pill run", job.kind));
      row.append(el("span", "jk", job.kind));
      row.append(el("span", "jid", job.id));
      row.append(el("span", "jspace"));
      const cancel = el("button", "ghost small", "Cancel");
      cancel.addEventListener("click", () => {
        rpc("runtime/jobs/cancel", { job_id: job.id }).catch(() => {});
      });
      row.append(cancel);
      host.append(row);
    });
  }

  // ---- drawers + sidebar (responsive) ----
  function openDrawer(id) {
    closeAllDrawers();
    $("#" + id).classList.add("open");
    $("#scrim").classList.add("open");
    if (id === "jobsDrawer") renderJobs();
    if (id === "toolsDrawer") $("#toolFilter").focus();
  }
  function closeAllDrawers() {
    $("#toolsDrawer").classList.remove("open");
    $("#jobsDrawer").classList.remove("open");
    $("#sidebar").classList.remove("open");
    $("#scrim").classList.remove("open");
  }
  function toggleSidebar() {
    const sb = $("#sidebar");
    const open = sb.classList.toggle("open");
    $("#scrim").classList.toggle("open", open);
  }

  // ---- mode (chat vs quick run) ----
  function setMode(mode) {
    const chatOn = mode === "chat";
    $("#chatView").classList.toggle("hidden", !chatOn);
    $("#oneShotView").classList.toggle("hidden", chatOn);
    if (chatOn) {
      // Restore the chat conversation title (first user message or default).
      const title = chat.firstUserText
        ? (chat.firstUserText.length > 40 ? chat.firstUserText.slice(0, 38) + "…" : chat.firstUserText)
        : "New chat";
      $("#convTitle").textContent = title;
      renderTopbarSession();
    } else {
      $("#convTitle").textContent = "Quick run";
      $("#convSub").textContent = "agent.run";
    }
  }

  // ---- textarea auto-grow ----
  function autoGrow(ta) {
    ta.style.height = "auto";
    ta.style.height = Math.min(ta.scrollHeight, 200) + "px";
  }

  // =======================================================================
  // init + wire up
  // =======================================================================
  async function init() {
    connectEvents();
    refreshChatControls();
    renderTopbarSession();
    refreshJobCount();
    try { renderInfo(await rpc("runtime/info")); }
    catch (e) { setStatus("err", "rpc error"); }
    try { const res = await rpc("runtime/tools/list"); renderTools(res && res.tools); }
    catch (e) { $("#toolCount").textContent = "!"; }
  }

  $("#start").addEventListener("click", startSession);
  $("#send").addEventListener("click", send);
  $("#newChat").addEventListener("click", newSession);
  $("#msg").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  $("#msg").addEventListener("input", (e) => autoGrow(e.target));

  // model / provider picker
  $("#modelPick").addEventListener("click", () => {
    if ($("#modelPop").classList.contains("hidden")) openModelPop(); else closeModelPop();
  });
  $("#popCancel").addEventListener("click", closeModelPop);
  $("#popApply").addEventListener("click", applyModelPick);

  // quick run / one-shot
  $("#quickRunBtn").addEventListener("click", () => { setMode("oneshot"); closeAllDrawers(); });
  $("#osRun").addEventListener("click", osRunTask);
  $("#osCancel").addEventListener("click", osCancelTask);
  $("#osTask").addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); osRunTask(); }
  });

  // drawers
  $("#toolsBtn").addEventListener("click", () => openDrawer("toolsDrawer"));
  $("#jobsBtn").addEventListener("click", () => openDrawer("jobsDrawer"));
  $("#toolFilter").addEventListener("input", (e) => paintTools(e.target.value || ""));
  document.querySelectorAll("[data-close-drawer]").forEach((b) => b.addEventListener("click", closeAllDrawers));
  $("#scrim").addEventListener("click", closeAllDrawers);
  $("#hamburger").addEventListener("click", toggleSidebar);

  // global keys
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      closeModelPop();
      closeAllDrawers();
    }
    if ((e.metaKey || e.ctrlKey) && (e.key === "n" || e.key === "N")) {
      e.preventDefault(); newSession(); $("#provider").focus();
    }
  });

  init();
})();
</script>
</body>
</html>
