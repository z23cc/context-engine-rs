<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nerve Workstation</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: #0b1220; color: #e5e7eb;
        font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        -webkit-user-select: none; user-select: none;
      }
      .card { text-align: center; max-width: 32rem; padding: 2rem; }
      .ring {
        width: 46px; height: 46px; margin: 0 auto 1.25rem;
        border: 3px solid #1f2937; border-top-color: #2dd4bf; border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 0.35rem; }
      p { margin: 0; color: #9ca3af; }
      .err {
        display: none; margin-top: 1.25rem; padding: 0.85rem 1rem; text-align: left;
        background: #1b1110; border: 1px solid #7f1d1d; border-radius: 8px;
        color: #fca5a5; white-space: pre-wrap; font-size: 13px;
      }
      body.has-error .ring { animation: none; border-top-color: #7f1d1d; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="ring"></div>
      <h1 id="title">Starting the Nerve daemon…</h1>
      <p id="hint">Connecting to the workstation engine.</p>
      <div class="err" id="err"></div>
    </div>
    <script>
      // Invoked from Rust (window.eval) if the daemon fails to start.
      window.__nerveError = function (message) {
        document.body.classList.add("has-error");
        document.getElementById("title").textContent = "Could not start the daemon";
        document.getElementById("hint").textContent =
          "See the details below, then restart the app.";
        var el = document.getElementById("err");
        el.style.display = "block";
        el.textContent = String(message);
      };
    </script>
  </body>
</html>
